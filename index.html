<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>意念语音（MindVoice）</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">意念语音</div>
      <nav>
        <a href="index.html">首页</a>
        <a href="admin.html">管理后台</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>心之所想，声之所至</h1>
      <p>意念语音 —— 让文字化为真实的声音</p>
    </section>

    <section class="demo-card">
      <div class="form-group">
        <label for="输入文本">输入文本</label>
        <textarea id="输入文本" placeholder="请输入需要合成的文字，例如：你好，世界！"></textarea>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="说话人">说话人</label>
          <select id="说话人">
            <option value="zh-CN-XiaoxiaoNeural">晓晓（普通话·女声·自然）</option>
            <option value="zh-CN-YunxiNeural">云希（普通话·男声·自然）</option>
            <option value="zh-CN-YunjianNeural">云健（普通话·男声·播报）</option>
            <option value="zh-CN-XiaoyiNeural">晓伊（普通话·女声·温柔）</option>
            <option value="zh-CN-XiaoxuanNeural">晓萱（普通话·女声·成熟）</option>
            <option value="zh-CN-YunyangNeural">云扬（普通话·男声·新闻）</option>
            <option value="zh-CN-YunxiaNeural">云夏（普通话·男声·少年）</option>
            <option value="zh-TW-HsiaoChenNeural">晓辰（台湾腔·女声）</option>
            <option value="zh-TW-YunJheNeural">云哲（台湾腔·男声）</option>
            <option value="zh-HK-WanLungNeural">云龙（粤语·男声）</option>
            <option value="zh-HK-HiuGaaiNeural">曉佳（粤语·女声）</option>
            <option value="en-US-EmmaMultilingualNeural">Emma（英语·女声·多语言）</option>
            <option value="en-US-AndrewMultilingualNeural">Andrew（英语·男声·多语言）</option>
            <option value="ja-JP-NanamiNeural">七海（日语·女声）</option>
            <option value="ko-KR-SunHiNeural">善熙（韩语·女声）</option>
          </select>
        </div>
        <div class="form-group">
          <label for="语速">语速</label>
          <input type="number" id="语速" min="0.5" max="2" step="0.1" value="1" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="生成按钮">生成语音</button>
        <button class="btn-secondary" id="下载按钮">下载音频</button>
      </div>

      <audio id="音频播放器" controls style="width:100%;margin-top:24px;border-radius:8px;display:none"></audio>
    </section>

    <section class="features">
      <div class="feature">
        <h3>多说话人</h3>
        <p>支持中文普通话、台湾腔、粤语，以及英语、日语、韩语。</p>
      </div>
      <div class="feature">
        <h3>语速调节</h3>
        <p>自由控制语速快慢，适配不同场景需求。</p>
      </div>
      <div class="feature">
        <h3>一键下载</h3>
        <p>生成后直接播放，点击下载即可保存 MP3 文件。</p>
      </div>
      <div class="feature">
        <h3>纯前端</h3>
        <p>无需后端服务，浏览器直接调用，打开即用。</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 意念语音（MindVoice）</p>
    </div>
  </footer>

  <div class="toast" id="提示"></div>
  <script src="assets/js/main.js"></script>
</body>
</html>
